<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Network Sketch</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { margin:0; background:#111; color:#ddd; font-family: system-ui, -apple-system, sans-serif; }
    #hud{
      position: fixed; left: 12px; top: 12px;
      background: rgba(0,0,0,0.55); padding: 10px 12px; border-radius: 10px;
      font-size: 13px; line-height: 1.4;
      max-width: 360px;
    }
    kbd{ background:#222; padding:2px 6px; border-radius:6px; border:1px solid #333; }
  </style>
</head>
<body>
  <div id="hud">
    <div><b>Network Sketch</b> — presence under unstable connection</div>
    <div>Drag to draw (shared canvas).</div>
    <div>Mode: <span id="mode">…</span> | You: <span id="me">…</span></div>
    <div>
      <kbd>1</kbd> normal
      <kbd>2</kbd> lag
      <kbd>3</kbd> loss
      <kbd>4</kbd> reconnect
      <kbd>C</kbd> clear
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
  <script src="./sketch.js"></script>
</body>
</html>
